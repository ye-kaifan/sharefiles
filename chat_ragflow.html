<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嵌入 iframe 示例</title>
    <style>
        /* 设置页面样式，使 iframe 占满整个页面 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <!-- 嵌入 iframe -->
    <iframe
        src="http://122.204.190.7:8380/chat/share?shared_id=ad54d9d2f02e11ef90fa0242ac120006&from=chat&auth=JlMjRlZDdhZjAzMjExZWZiOTBiMDI0Mm"
        style="width: 100%; height: 100%; min-height: 600px;"
        frameborder="0"
    >
    </iframe>
</body>
</html>
