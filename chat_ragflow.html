<!DOCTYPE html>
<html lang="zh-CN">

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 300px;
            background-color: #f4f4f4;
            padding: 20px;
            box-sizing: border-box;
            border-right: 1px solid #ddd;
        }

        .sidebar h2 {
            margin-top: 0;
        }

        .sidebar button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .iframe-container {
            flex: 1;
            padding: 20px;
            box-sizing: border-box;
        }

        iframe {
            width: 100%;
            height: 700px;
            border: none;
        }
    </style>
</head>

    <div class="container">

            <h2>左侧边栏</h2>

        </div>
        <div class="iframe-container">

            <iframe

                style="width: 100%; height: 700px"
